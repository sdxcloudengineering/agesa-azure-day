# DEMO AMAÇLIDIR: Gerçek kullanımda bu dosyayı repoya committ etmeyin.
# Değerleri kendi Azure Database for PostgreSQL bağlantı bilgilerinizle
# değiştirin ya da `kubectl create secret generic agesa-demo-db-secret
# --from-literal=DATABASE_URL=... -n agesa-demo` komutuyla imperative
# olarak oluşturup bu dosyayı sadece referans için tutun.
apiVersion: v1
kind: Secret
metadata:
  name: agesa-demo-db-secret
  namespace: agesa-demo
type: Opaque
stringData:
  DATABASE_URL: "postgresql://<kullanici>:<parola>@<sunucu-adi>.postgres.database.azure.com:5432/<veritabani>?sslmode=require"
