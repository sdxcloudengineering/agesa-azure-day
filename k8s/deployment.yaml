apiVersion: apps/v1
kind: Deployment
metadata:
  name: agesa-demo-app
  namespace: agesa-demo
  labels:
    app: agesa-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agesa-demo-app
  template:
    metadata:
      labels:
        app: agesa-demo-app
    spec:
      containers:
        - name: agesa-demo-app
          # TODO: <acr-adi>.azurecr.io ile kendi ACR adınızı değiştirin,
          # ör. docker build/push sonrası: myacr.azurecr.io/agesa-demo-app:latest
          image: <acr-adi>.azurecr.io/agesa-demo-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agesa-demo-db-secret
                  key: DATABASE_URL

