# NGINX Ingress Controller'ın küme üzerinde kurulu olduğu varsayılır
# (AKS için: `helm install ingress-nginx ingress-nginx/ingress-nginx`).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agesa-demo-app
  namespace: agesa-demo
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  rules:
    - host: demo.agesa.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agesa-demo-app
                port:
                  number: 80
